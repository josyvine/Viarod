name: Build Android APK 

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # FIX 1: Safely pass the secret via 'env' and validate it is not empty
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 || vars.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is empty or missing on GitHub! Please add it in Settings > Secrets > Actions."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/safevoice.jks
          
          if [ ! -s ${{ github.workspace }}/safevoice.jks ]; then
            echo "::error::The decoded keystore file is empty (0 bytes). Check your Base64 encoding."
            exit 1
          fi
          echo "Keystore successfully decoded. Size: $(wc -c < ${{ github.workspace }}/safevoice.jks) bytes"

      # FIX 2: Safeguard the printing step so empty environment credentials don't hang the runner
      # Updated the default alias fallback from 'upload' to your correct alias 'viaro'
      - name: Print Keystore SHA Fingerprints
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || vars.KEY_ALIAS || 'viaro' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || vars.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::KEYSTORE_PASSWORD is not set! Skipping fingerprint generation."
            exit 1
          fi
          keytool -list -v \
            -keystore ${{ github.workspace }}/safevoice.jks \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASSWORD"

      # Setup a modern version of Gradle on the virtual runner machine compatible with AGP 9.1.1
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      # Generate a fresh, uncorrupted Gradle wrapper binary using Gradle 9.3.1
      - name: Regenerate Gradle Wrapper
        run: gradle wrapper

      # Grant execute permission to the Gradle wrapper script to resolve permission denied error
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # FIX 3: Aligned the environment variables to match exactly what your build.gradle.kts expects
      # Added KEY_ALIAS env variable with 'viaro' as the fallback to align with the build script
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/safevoice.jks # Changed from KEYSTORE_FILE to match Gradle
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || vars.KEYSTORE_PASSWORD }} # Changed from KEYSTORE_PASSWORD to match Gradle
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD || vars.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || vars.KEY_ALIAS || 'viaro' }}

      # FIX 4: Use a wildcard match for the path so the upload does not fail if your file is named differently
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
